<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Portfolio website for John Toner, a full stack engineer building climate and environmental data tools." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>John Toner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Lora:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem('theme');
          const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          const shouldUseLight = storedTheme ? storedTheme === 'light' : prefersLight;
          document.documentElement.classList.toggle('light', shouldUseLight);
        } catch (error) {}
      })();
    </script>
  </head>
  <body>
    <div id="loading" style="position:fixed;inset:0;background:#0b1118;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.3s ease">
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-ring {
          width: 28px; height: 28px;
          border: 2px solid rgba(255,255,255,0.08);
          border-top-color: rgba(255,255,255,0.5);
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
        }
      </style>
      <div id="loading-ring"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
